server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host ${MASH_UI_UPSTREAM_HOST};
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Accept-Encoding "";
    proxy_buffering off;

    sub_filter_once off;
    sub_filter_types text/css application/javascript text/javascript application/json;
    sub_filter 'http://RDWWTWS-41LGZ2:' 'http://${MASH_HOST}:';
    sub_filter 'http://rdwwtws-41lgz2:' 'http://${MASH_HOST}:';
    sub_filter 'RDWWTWS-41LGZ2' '${MASH_HOST}';
    sub_filter 'rdwwtws-41lgz2' '${MASH_HOST}';

    proxy_redirect http://${MASH_UI_UPSTREAM_HOST}:${MASH_UI_UPSTREAM_PORT}/ http://$host:${MASH_UI_PORT}/;

    location / {
        proxy_pass http://${MASH_UI_UPSTREAM_HOST}:${MASH_UI_UPSTREAM_PORT};
    }
}
